  <script data-source="MobileView.js" data-version="1" data-exports-type="mobile-view-component-v1">if (window.customElements && window.customElements.define) {
  class MobileViewComponent extends HTMLElement {
    constructor() {
      super();
      this.text = null;
      this.colorCode = null;
    }

    connectedCallback() {
      this.checkDeviceAndToggleVisibility();
      this.generateDescription();
    }

    static get observedAttributes() {
      return ['title-text', 'background-color-code'];
    }

    attributeChangedCallback(attributeName) {
      this.generateDescription();
    }

    checkDeviceAndToggleVisibility() {
      // Check if the user is on a mobile device
      const isMobile = true;
      
      if (isMobile) {
        this.style.display = 'none'; // Hide the component on mobile
      } else {
        this.style.display = 'none';
      }
    }

    generateDescription() {
      const text = this.getAttribute('title-text') || 'For the best ad experience, please view this on a mobile device';
      const colorCode = this.getAttribute('background-color-code') || '#181818'; // Default color is black

      // Create the div element
      let overlayDiv = document.createElement('div');
      overlayDiv.style.position = 'relative';
      overlayDiv.style.display = 'flex'; // Set to flex for centering
      overlayDiv.style.alignItems = 'center'; // Center items vertically
      overlayDiv.style.justifyContent = 'center'; // Center items horizontally
      overlayDiv.style.fontFamily = 'cursive'; // Set font family
      overlayDiv.style.boxSizing = 'border-box'; // Add box-sizing property
      overlayDiv.style.padding = '20px';
      overlayDiv.style.color = '#fff';
      overlayDiv.style.backgroundColor = colorCode;
      overlayDiv.style.width = '100%';
      overlayDiv.style.height = '100%';

      // Create the h2 element for the title
      let titleElement = document.createElement('h2');
      titleElement.style.margin = '0';
      titleElement.style.textAlign = 'center';
      titleElement.textContent = text;

      // Append the title to the overlay div
      overlayDiv.appendChild(titleElement);

      // Clear the existing content and add the overlay div to the component
      this.innerHTML = ''; // Clear any existing content
      this.appendChild(overlayDiv);
    }
  }

  customElements.define('mobile-view-component-v1', MobileViewComponent);
}
